_format_version: "3.0"

services:
  - name: auth-service
    url: http://auth-service:8080
    routes:
      - name: auth-route
        paths:
          - /api/v1/auth

  - name: venue-service
    url: http://venue-service:3000
    routes:
      - name: venue-route
        paths:
          - /api/v1/venues

plugins:
  - name: rate-limiting
    config:
      minute: 60
      policy: local
